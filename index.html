<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; connect-src *; img-src * data: blob:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cruise Terminal Rotterdam</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #04080f;
      --panel:   #080f1c;
      --border:  rgba(255,255,255,0.1);
      --gold:    #d4a843;
      --gold2:   #f0c96a;
      --white:   #ffffff;
      --dim:     rgba(255,255,255,0.55);
      --green:   #3ddc84;
      --amber:   #f5a623;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100vw; height:100vh;
      overflow:hidden;
      background:var(--bg);
      color:var(--white);
      font-family:'DM Sans', sans-serif;
    }

    /* ── Full-screen grid: header / body / footer ── */
    #app {
      width:100%; height:100%;
      display:grid;
      grid-template-rows: 14vh 1fr 9vh;
    }

    /* ══════════════ HEADER ══════════════ */
    #header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 5vw;
      background:linear-gradient(180deg, rgba(4,8,15,0.98) 0%, rgba(4,8,15,0.7) 100%);
      border-bottom:2px solid var(--gold);
    }

    #brand {
      display:flex;
      flex-direction:column;
      gap:0.3vh;
    }

    #brand-title {
      font-family:'Playfair Display', serif;
      font-size:4.2vh;
      font-weight:900;
      letter-spacing:0.06em;
      color:var(--white);
      text-transform:uppercase;
      line-height:1;
    }

    #brand-title em {
      color:var(--gold);
      font-style:normal;
    }

    #brand-sub {
      font-size:1.7vh;
      letter-spacing:0.35em;
      color:var(--dim);
      text-transform:uppercase;
      font-weight:500;
    }

    #header-right {
      text-align:right;
    }

    #clock {
      font-family:'Playfair Display', serif;
      font-size:5.5vh;
      font-weight:700;
      color:var(--gold);
      font-variant-numeric:tabular-nums;
      line-height:1;
    }

    #dateline {
      font-size:1.7vh;
      color:var(--dim);
      letter-spacing:0.2em;
      text-transform:uppercase;
      margin-top:0.4vh;
    }

    /* ══════════════ BODY ══════════════ */
    #body {
      display:grid;
      grid-template-columns:1fr 42%;
      overflow:hidden;
    }

    /* ── LEFT: Today's ship ── */
    #today {
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:4vh 5vw;
      border-right:2px solid var(--border);
      position:relative;
      overflow:hidden;
      gap:2.5vh;
    }

    /* Subtle diagonal accent behind content */
    #today::before {
      content:'';
      position:absolute;
      top:-20%;
      right:-10%;
      width:60%;
      height:140%;
      background:radial-gradient(ellipse at center, rgba(212,168,67,0.06) 0%, transparent 70%);
      pointer-events:none;
    }

    #today-eyebrow {
      display:flex;
      align-items:center;
      gap:1.5vw;
      font-size:1.8vh;
      letter-spacing:0.45em;
      text-transform:uppercase;
      font-weight:700;
      color:var(--gold);
    }

    #today-eyebrow::before {
      content:'';
      display:block;
      width:3vw;
      height:2px;
      background:var(--gold);
      flex-shrink:0;
    }

    #today-ship-name {
      font-family:'Playfair Display', serif;
      font-size:9vh;
      font-weight:900;
      line-height:0.92;
      color:var(--white);
      letter-spacing:0.01em;
    }

    #today-ship-name.long  { font-size:6.5vh; }
    #today-ship-name.xlong { font-size:5vh; }

    /* Ship photo — displayed as a contained image, not a background */
    #ship-photo-wrap {
      width:100%;
      max-height:22vh;
      border-radius:4px;
      overflow:hidden;
      border:1px solid rgba(212,168,67,0.25);
      background:rgba(255,255,255,0.04);
      display:none; /* shown when image loads */
    }

    #ship-photo {
      width:100%;
      height:100%;
      max-height:22vh;
      object-fit:cover;
      object-position:center 30%;
      filter:brightness(0.9) saturate(0.85);
      display:block;
    }

    #today-times-row {
      display:flex;
      gap:5vw;
    }

    .time-block {}

    .time-lbl {
      font-size:1.7vh;
      letter-spacing:0.4em;
      color:var(--dim);
      text-transform:uppercase;
      font-weight:700;
      margin-bottom:0.4vh;
    }

    .time-val {
      font-family:'Playfair Display', serif;
      font-size:5.5vh;
      font-weight:700;
      color:var(--gold2);
      letter-spacing:0.04em;
      line-height:1;
    }

    #status-badge {
      display:inline-flex;
      align-items:center;
      gap:1vw;
      font-size:2vh;
      letter-spacing:0.3em;
      text-transform:uppercase;
      font-weight:700;
      padding:1vh 2.5vw;
      border-radius:3px;
      align-self:flex-start;
    }

    #status-badge.in-port  { background:rgba(61,220,132,0.12); border:2px solid rgba(61,220,132,0.5); color:var(--green); }
    #status-badge.upcoming { background:rgba(212,168,67,0.10); border:2px solid rgba(212,168,67,0.45); color:var(--gold2); }
    #status-badge.departed { background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.15); color:var(--dim); }
    #status-badge.none     { background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.15); color:var(--dim); }

    .pulse {
      width:0.9vh; height:0.9vh;
      border-radius:50%;
      background:currentColor;
      animation:pulse 2s infinite;
      flex-shrink:0;
    }
    .departed .pulse, .none .pulse { animation:none; opacity:0.4; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── RIGHT: Upcoming ── */
    #upcoming {
      display:flex;
      flex-direction:column;
      overflow:hidden;
      background:rgba(8,15,28,0.7);
    }

    #upcoming-hdr {
      padding:2.5vh 3vw 1.5vh;
      border-bottom:1px solid var(--border);
      font-size:1.7vh;
      letter-spacing:0.45em;
      text-transform:uppercase;
      color:var(--gold);
      font-weight:700;
      flex-shrink:0;
    }

    #upcoming-list {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .ship-row {
      flex:1;
      display:flex;
      align-items:center;
      gap:2.5vw;
      padding:0 3vw;
      border-bottom:1px solid var(--border);
      animation:fadeUp 0.5s ease both;
    }
    .ship-row:last-child { border-bottom:none; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .ship-date-box {
      flex-shrink:0;
      width:7vh;
      height:7vh;
      background:rgba(212,168,67,0.1);
      border:1px solid rgba(212,168,67,0.3);
      border-radius:4px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:0;
    }

    .ship-day {
      font-family:'Playfair Display', serif;
      font-size:3vh;
      font-weight:700;
      color:var(--gold2);
      line-height:1;
      font-variant-numeric:tabular-nums;
    }

    .ship-month {
      font-size:1.4vh;
      letter-spacing:0.2em;
      color:var(--dim);
      text-transform:uppercase;
      font-weight:700;
      margin-top:0.2vh;
    }

    .ship-info {
      flex:1;
      min-width:0;
    }

    .ship-name {
      font-family:'Playfair Display', serif;
      font-size:3.2vh;
      font-weight:700;
      color:var(--white);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.1;
    }

    .ship-times {
      font-size:1.9vh;
      color:var(--dim);
      margin-top:0.5vh;
      letter-spacing:0.05em;
    }

    .ship-times b { color:rgba(255,255,255,0.8); font-weight:500; }

    .in-port-tag {
      font-size:1.4vh;
      letter-spacing:0.2em;
      text-transform:uppercase;
      color:var(--green);
      font-weight:700;
      margin-top:0.3vh;
    }

    /* ══════════════ FOOTER ══════════════ */
    #footer {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 5vw;
      border-top:2px solid var(--border);
      background:rgba(4,8,15,0.95);
      flex-shrink:0;
    }

    #footer-left {
      display:flex;
      align-items:center;
      gap:2vw;
      font-size:1.8vh;
      color:var(--dim);
      letter-spacing:0.15em;
      text-transform:uppercase;
    }

    #footer-sep { color:var(--border); }

    #caveat {
      color:rgba(212,168,67,0.7);
      font-style:italic;
      letter-spacing:0.08em;
    }

    #footer-right {
      display:flex;
      align-items:center;
      gap:1.2vw;
      font-size:1.8vh;
      color:var(--dim);
      letter-spacing:0.1em;
      text-transform:uppercase;
    }

    #live-dot {
      width:1vh; height:1vh;
      border-radius:50%;
      background:var(--green);
      animation:pulse 2s infinite;
    }
    #live-dot.stale { background:var(--amber); animation:none; }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="brand">
      <div id="brand-title">Cruise Terminal <em>Rotterdam</em></div>
      <div id="brand-sub">Wilhelminakade · Arrivals &amp; Departures</div>
    </div>
    <div id="header-right">
      <div id="clock">--:--</div>
      <div id="dateline">--</div>
    </div>
  </div>

  <!-- BODY -->
  <div id="body">

    <!-- TODAY -->
    <div id="today">
      <div id="today-eyebrow">Today in Rotterdam</div>
      <div id="today-ship-name">—</div>
      <div id="ship-photo-wrap">
        <img id="ship-photo" src="" alt="" />
      </div>
      <div id="today-times-row">
        <div class="time-block">
          <div class="time-lbl">Arrival</div>
          <div class="time-val" id="t-arr">—</div>
        </div>
        <div class="time-block">
          <div class="time-lbl">Departure</div>
          <div class="time-val" id="t-dep">—</div>
        </div>
      </div>
      <div id="status-badge" class="none">
        <span class="pulse"></span>
        <span id="status-text">Loading…</span>
      </div>
    </div>

    <!-- UPCOMING -->
    <div id="upcoming">
      <div id="upcoming-hdr">Next vessel calls</div>
      <div id="upcoming-list"></div>
    </div>

  </div>

  <!-- FOOTER -->
  <div id="footer">
    <div id="footer-left">
      <span>Source: cruiseportrotterdam.nl</span>
      <span id="footer-sep">·</span>
      <span id="caveat">Subject to change</span>
    </div>
    <div id="footer-right">
      <div id="live-dot"></div>
      <span id="refresh-text">Loading…</span>
    </div>
  </div>

</div>
<script>
// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('dateline').textContent =
    now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Seed data (fetched from cruiseportrotterdam.nl on 20 March 2026) ──
const SEED = [
  { name:"Iona",                     date:"2026-03-29", arrival:"15:00", departure:"21:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2023/08/Iona-17.01.2021-A-600x400.jpg" },
  { name:"Ambience",                  date:"2026-04-01", arrival:"08:00", departure:"19:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2022/09/Ambience-1-600x400.jpg" },
  { name:"AIDAnova",                  date:"2026-04-02", arrival:"08:00", departure:"21:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2021/10/AIDAnova-3-600x400.jpg" },
  { name:"Rotterdam",                 date:"2026-04-05", arrival:"07:00", departure:"15:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2021/09/Rotterdam-6-600x400.jpg" },
  { name:"Rotterdam",                 date:"2026-04-12", arrival:"07:00", departure:"14:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2021/09/Rotterdam-6-600x400.jpg" },
  { name:"Renaissance (MAIDEN CALL)", date:"2026-04-14", arrival:"08:00", departure:"18:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2025/09/Renaissance-1-600x400.jpg" },
  { name:"Nieuw Statendam",           date:"2026-04-18", arrival:"07:00", departure:"15:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2023/09/Nieuw-Statendam-7-600x400.jpg" },
  { name:"AIDAperla",                 date:"2026-04-23", arrival:"08:00", departure:"22:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2018/08/IMG_1132-600x400.jpg" },
  { name:"Star Pride",                date:"2026-04-24", arrival:"09:00", departure:"22:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2025/05/Star-Pride-1-600x400.jpg" },
  { name:"Rotterdam",                 date:"2026-04-26", arrival:"10:00", departure:"15:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2021/09/Rotterdam-6-600x400.jpg" },
  { name:"Balmoral",                  date:"2026-04-27", arrival:"07:00", departure:"18:30", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2018/02/balmoral-600x400.jpg" },
  { name:"Star Pride",                date:"2026-04-30", arrival:"09:00", departure:"22:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2025/05/Star-Pride-1-600x400.jpg" },
  { name:"Nieuw Statendam",           date:"2026-05-01", arrival:"07:00", departure:"15:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2023/09/Nieuw-Statendam-7-600x400.jpg" },
  { name:"Borealis",                  date:"2026-05-02", arrival:"06:00", departure:"23:00", imageUrl:"https://www.cruiseportrotterdam.nl/wp-content/uploads/2023/09/Borealis-1.jpg" },
];

// ── Status helpers ──
function toMin(t) {
  if (!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60+(m||0);
}
function getStatus(ship) {
  const now  = new Date();
  const today = now.toISOString().split('T')[0];
  if (!ship.date || ship.date > today) return 'upcoming';
  if (ship.date < today) return 'departed';
  const cur = now.getHours()*60+now.getMinutes();
  const arr = toMin(ship.arrival) ?? 0;
  const dep = toMin(ship.departure) ?? 1439;
  if (cur < arr) return 'upcoming';
  if (cur > dep) return 'departed';
  return 'in-port';
}
function findFeatured(schedule) {
  const today = new Date().toISOString().split('T')[0];
  return (
    schedule.find(s => s.date===today && getStatus(s)==='in-port') ||
    schedule.find(s => s.date===today) ||
    schedule.find(s => (s.date||'')>=today) ||
    schedule[0] || null
  );
}

// ── Render today ──
function renderToday(ship) {
  const nameEl   = document.getElementById('today-ship-name');
  const arrEl    = document.getElementById('t-arr');
  const depEl    = document.getElementById('t-dep');
  const badge    = document.getElementById('status-badge');
  const statText = document.getElementById('status-text');
  const photoWrap = document.getElementById('ship-photo-wrap');
  const photo    = document.getElementById('ship-photo');

  if (!ship) {
    nameEl.textContent = 'No vessel today';
    nameEl.className = '';
    arrEl.textContent = '—';
    depEl.textContent = '—';
    badge.className = 'none';
    statText.textContent = 'No vessels scheduled';
    photoWrap.style.display = 'none';
    return;
  }

  nameEl.textContent = ship.name || '—';
  nameEl.className =
    (ship.name||'').length > 24 ? 'xlong' :
    (ship.name||'').length > 16 ? 'long' : '';

  arrEl.textContent = ship.arrival  || '—';
  depEl.textContent = ship.departure || '—';

  const status = getStatus(ship);
  badge.className = status === 'in-port' ? 'in-port' : status === 'upcoming' ? 'upcoming' : 'departed';
  statText.textContent =
    status === 'in-port'  ? 'Currently in port' :
    status === 'upcoming' ? `Arriving at ${ship.arrival||'—'}` :
                            'Departed';

  // Ship photo
  if (ship.imageUrl) {
    const tmp = new Image();
    tmp.onload = () => {
      photo.src = ship.imageUrl;
      photoWrap.style.display = 'block';
    };
    tmp.onerror = () => { photoWrap.style.display = 'none'; };
    tmp.src = ship.imageUrl;
  } else {
    photoWrap.style.display = 'none';
  }
}

// ── Render upcoming (max 4) ──
function renderUpcoming(schedule) {
  const today = new Date().toISOString().split('T')[0];
  const list  = schedule.filter(s => (s.date||'') >= today).slice(0, 4);
  const el    = document.getElementById('upcoming-list');
  el.innerHTML = '';

  if (!list.length) {
    el.innerHTML = '<div style="padding:3vh 3vw;font-size:2.2vh;color:var(--dim);letter-spacing:0.2em;text-transform:uppercase;">No upcoming vessels</div>';
    return;
  }

  list.forEach((ship, i) => {
    const d      = ship.date ? new Date(ship.date+'T12:00:00') : null;
    const status = getStatus(ship);
    const row    = document.createElement('div');
    row.className = 'ship-row';
    row.style.animationDelay = `${i*0.08}s`;
    row.innerHTML = `
      <div class="ship-date-box">
        <div class="ship-day">${d ? d.getDate() : '?'}</div>
        <div class="ship-month">${d ? MONTHS[d.getMonth()] : '?'}</div>
      </div>
      <div class="ship-info">
        <div class="ship-name">${ship.name||'—'}</div>
        <div class="ship-times">
          <b>${ship.arrival||'?'}</b> arrival &nbsp;·&nbsp; <b>${ship.departure||'?'}</b> departure
        </div>
        ${status==='in-port' ? '<div class="in-port-tag">● In port now</div>' : ''}
      </div>`;
    el.appendChild(row);
  });
}

// ── API fetch (HTTPS only) ──
async function fetchLive() {
  if (window.location.protocol === 'file:') return null;
  try {
    const today = new Date().toISOString().split('T')[0];
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:2000,
        system:`You fetch cruise schedules. Visit https://www.cruiseportrotterdam.nl/cruise-calls/ and return ONLY a JSON array, nothing else. Each item: {"name":"ship name","date":"YYYY-MM-DD","arrival":"HH:MM","departure":"HH:MM","imageUrl":"URL or null"}. Today is ${today}. Output must start with [ and end with ].`,
        messages:[{role:"user",content:"Fetch https://www.cruiseportrotterdam.nl/cruise-calls/ and return the JSON array."}],
        tools:[{type:"web_search_20250305",name:"web_search"}]
      })
    });
    if (!res.ok) return null;
    const data = await res.json();
    for (const block of (data.content||[])) {
      const r = tryParse(block);
      if (r) return r;
    }
    return null;
  } catch(e) { return null; }
}

function tryParse(block) {
  const texts = [];
  if (block.type==='text' && block.text) texts.push(block.text);
  if (block.type==='tool_result' && Array.isArray(block.content))
    block.content.forEach(b => { if(b.type==='text'&&b.text) texts.push(b.text); });
  for (const t of texts) {
    const c = t.replace(/```json|```/gi,'').trim();
    const s = c.indexOf('['), e = c.lastIndexOf(']');
    if (s<0||e<=s) continue;
    try {
      const p = JSON.parse(c.substring(s,e+1));
      if (Array.isArray(p)&&p.length) return p;
    } catch(_) {}
  }
  return null;
}

// ── Main ──
let cache = [...SEED];

function render() {
  renderToday(findFeatured(cache));
  renderUpcoming(cache);
}

async function update() {
  render(); // render seed immediately
  const live = await fetchLive();
  if (live && live.length) {
    cache = live;
    render();
    document.getElementById('live-dot').className = '';
    document.getElementById('refresh-text').textContent =
      `Live · ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
  } else {
    document.getElementById('live-dot').className = 'stale';
    document.getElementById('refresh-text').textContent =
      window.location.protocol==='file:'
        ? 'Seed data · Host on HTTPS for live updates'
        : `Cached · ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
  }
}

update();
setInterval(update, 30*60*1000);
setInterval(render, 60*1000);
</script>
</body>
</html>
